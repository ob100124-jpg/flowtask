<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <nav class="navbar">
    <span class="logo">TASKFLOW</span>
    <div class="nav-links">
        <button id="projectsBtn">📁 Projets</button>
        <button id="logoutBtn">🚪 Logout</button>
    </div>
    </nav>
    <button onclick="location.href='../notification/notifications.html'">
  🔔  <span id="notif-badge" style="display:none; background:#f44336; color:#fff;
            border-radius:50%; padding:1px 6px; font-size:11px; font-weight:700;">0</span>
    </button>
    <div class="container">
        <h1>🏠 Mon Tableau de Bord</h1>

        <!-- Les métriques -->
        <div class="metrics">
            <div class="card">
                <h3>📋 Tâches assignées</h3>
                <p id="tasksAssignees">...</p>
            </div>
            <div class="card">
                <h3>✅ Tâches terminées</h3>
                <p id="tasksTerminees">...</p>
            </div>
            <div class="card">
                <h3>⚠️ Tâches en retard</h3>
                <p id="tasksEnRetard">...</p>
            </div>
        </div>

        <!-- Tasks en cours -->
        <div class="section">
            <h2>🔄 Tâches en cours</h2>
            <div id="tasksEnCours"></div>
        </div>
    </div>
     <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>    
    <script src="dashboard.js"></script>
    <script src="../notification/notifications-client.js"></script>
</body>
</html>
