<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tâches</title>
    <link rel="stylesheet" href="tasks.css">
</head>
<body>
    <div class="container">
        <h1>Gestion des Tâches</h1>

        <!-- Formulaire création task -->
        <div class="form-section">
            <h2>Nouvelle Tâche</h2>
            <input type="text" id="titre" placeholder="Titre de la tâche" required>
            
            <!-- Menu déroulant priorité -->
            <select id="priorite">
                <option value="basse">Basse</option>
                <option value="moyenne">Moyenne</option>
                <option value="haute">Haute</option>
            </select>

            <!-- Menu déroulant membres -->
            <select id="assignedTo">
                <option value="">Assigner à un membre...</option>
            </select>

            <button onclick="createTask()">Créer la tâche</button>
        </div>

        <!-- Liste des tâches -->
        <div id="tasks-list"></div>
    </div>

    <script src="tasks.js"></script>
</body>
</html>
