<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJECTS</title>
    <link rel="stylesheet" href="./projects.css">
</head>
<body>
<div class="top-bar">
    <h1>PROJECTS</h1>
    <div class="top-buttons">
        <button id="btn-add-project">Add Project</button>
        <button id="btn-dashboard" onclick="window.location.href='../dashboard/dashboard.html'">Dashboard</button>
    </div>
        <button onclick="location.href='../notification/notifications.html'">
  🔔    <span id="notif-badge" style="display:none; background:#f44336; color:#fff;
            border-radius:50%; padding:1px 6px; font-size:11px; font-weight:700;">0</span>
        </button>
</div>
<form id="project-form" style="display: none; margin-top: 20px ;">
    <input type="text" id="title" placeholder="Project Title" required>
    <input type="text" id="description" placeholder="Project Description" >
    <input type="date" id="deadline">
    <select id="status">
        <option value="active">Active</option>
        <option value="paused">Paused</option>
        <option value="archived">Archived</option>
    </select>
    <button type="submit">Create Project</button>
</form>

<table id="project-list">
    <thead>
        <tr>
            <th>Title</th>
            <th>Description</th>
            <th>Deadline</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody id="project-tbody">
    </tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script type="module" src="./projects.js"></script>
<script src="../notification/notifications-client.js"></script>
</body>
</html>
