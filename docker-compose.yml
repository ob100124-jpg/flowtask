version: '3.9'
services:

  mongo:
    image: mongo:6
    container_name: taskflow_mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: taskflow_backend
    restart: always
    ports:
      - "5000:5000"
    env_file: ./backend/.env
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: taskflow_frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mongo_data: